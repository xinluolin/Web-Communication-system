<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>端到端加密即时通讯</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #e9f0fc 0%, #d9e4f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 150%;
            height: 150%;
            top: -30%;
            left: -30%;
            background: radial-gradient(circle at 30% 40%, rgba(59,130,246,0.1), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .box {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Login panel */
        #loginBox {
            width: 480px;
            max-width: 90vw;
            padding: 48px 40px;
            text-align: center;
            animation: floatGlow 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatGlow {
            0% { opacity: 0; transform: scale(0.96) translateY(20px); filter: blur(2px);}
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0);}
        }

        .login-icon {
            font-size: 68px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        #loginBox h2 {
            font-weight: 700;
            font-size: 2rem;
            background: linear-gradient(120deg, #1e293b, #2d3a5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        #loginBox input {
            width: 100%;
            padding: 16px 20px;
            border: 1.5px solid rgba(203, 213, 225, 0.6);
            background: white;
            border-radius: 28px;
            font-size: 1rem;
            transition: all 0.25s;
            outline: none;
        }

        #loginBox input:focus {
            border-color: #3b82f6;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.15);
        }

        #loginBox button {
            width: 100%;
            background: linear-gradient(105deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
        }

        #loginBox button:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #2563eb, #1d4ed8);
        }

        /* Chat Window */
        #chatBox {
            width: 96vw;
            max-width: 1400px;
            height: 85vh;
            min-height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.86);
            border-radius: 2rem;
        }

        /* Top bar */
        .chat-header {
            padding: 12px 24px;
            background: transparent;
            border-bottom: 1px solid rgba(203, 213, 225, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header h2 i {
            color: #3b82f6;
        }

        .user-info {
            background: rgba(59,130,246,0.12);
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e40af;
        }

        /* Main layout */
        .chat-body {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Sidebar */
        .chat-sidebar {
            width: 300px;
            background: rgba(248, 250, 252, 0.7);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(203, 213, 225, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* Search */
        .search-section {
            padding: 16px 14px 12px 14px;
            border-bottom: 1px solid rgba(203, 213, 225, 0.4);
            flex-shrink: 0;
        }

        /* Session List */
        .session-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            padding: 12px 0 0 0;
        }

        .session-header {
            padding: 0 14px 8px 14px;
        }

        .session-header .sidebar-label {
            margin-bottom: 0;
        }

        /* Session scroll */
        .session-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 8px 12px;
        }

        /* Crypto section (disabled for release) */
        .algo-section {
            padding: 12px 14px;
            border-top: 1px solid rgba(203, 213, 225, 0.4);
            flex-shrink: 0;
            background: rgba(248, 250, 252, 0.9);
        }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5b6e8c;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid rgba(203, 213, 225, 0.6);
            border-radius: 30px;
            background: white;
            font-size: 0.85rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: #3b82f6;
        }

        .search-box button {
            background: #3b82f6;
            border: none;
            border-radius: 30px;
            padding: 0 18px;
            color: white;
            font-weight: 500;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .search-box button:hover {
            background: #2563eb;
        }

        .search-result {
    margin-top: 10px;
    font-size: 0.75rem;
}

.result-found, .result-not-found, .result-empty {
    padding: 8px 12px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.result-found {
    background: #eef2ff;
    color: #1e40af;
    border: 1px solid #c7d2fe;
}

.result-not-found {
    background: #fee2e2;
    color: #b91c1c;
}

.result-empty {
    background: #f1f5f9;
    color: #64748b;
}

        /* Session list */
        .session-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .session-tab {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: white;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .session-tab:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
        }

        .session-tab.active {
            background: #3b82f6;
        }

        .session-tab.active .session-peer {
            color: white;
        }

        .session-peer {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .session-peer i {
            width: 24px;
            color: #5b6e8c;
        }

        .session-tab.active .session-peer i {
            color: white;
        }

        .key-status {
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .key-status-negotiating { background: #fef9c3; color: #a16207; }
        .key-status-complete { background: #dcfce7; color: #15803d; }

        /* Crypto options */
        .algo-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .algo-row label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
        }

        .algo-row select {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 0.7rem;
        }

        .toggle-label {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        .toggle-label input {
            margin-left: 10px;
        }

        /* Chat area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(255,255,255,0.3);
            min-width: 0;
        }

        /* Messages */
        #msgArea {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        #msgArea::-webkit-scrollbar {
            width: 4px;
        }
        #msgArea::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Message bubble */
        .msg-bubble {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            flex-shrink: 0;
        }

        .msg-bubble.mine {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg-bubble.peer {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-content {
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 1.1rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .msg-bubble.mine .msg-content {
            background: linear-gradient(115deg, #3b82f6, #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.peer .msg-content {
            background: white;
            border: 1px solid #e2e8f0;
            color: #1e293b;
            border-bottom-left-radius: 4px;
        }

        .debug-info {
            margin-top: 4px;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.04);
            border-radius: 12px;
            padding: 4px 8px;
            font-family: monospace;
            color: #475569;
            max-width: 100%;
            word-break: break-all;
            display: none;
        }

        .debug-info.visible {
            display: block;
        }

        /* Image message */
        .msg-image {
            max-width: 260px;
            max-height: 260px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            display: block;
        }

        .msg-image:hover {
            transform: scale(1.02);
        }

        .msg-bubble.mine .msg-image {
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.peer .msg-image {
            border-bottom-left-radius: 4px;
        }

        .msg-image-wrapper {
            position: relative;
            display: inline-block;
        }

        /* Image upload button */
        .img-upload-btn {
            background: transparent !important;
            border: 1.5px dashed #cbd5e1 !important;
            color: #5b6e8c !important;
            padding: 8px 12px !important;
            border-radius: 40px !important;
            cursor: pointer;
            font-size: 1rem !important;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
        }

        .img-upload-btn:hover {
            border-color: #3b82f6 !important;
            color: #3b82f6 !important;
            background: rgba(59,130,246,0.08) !important;
        }

        /* Image preview overlay */
        .image-preview-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            cursor: pointer;
        }

        .image-preview-overlay img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Image loading */
        .msg-image-loading {
            width: 200px;
            height: 150px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        /* Video message */
        .msg-video {
            max-width: 320px;
            max-height: 240px;
            border-radius: 12px;
            display: block;
            cursor: pointer;
            background: #000;
        }

        .msg-bubble.mine .msg-video {
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.peer .msg-video {
            border-bottom-left-radius: 4px;
        }

        .msg-video-wrapper {
            position: relative;
            display: inline-block;
        }

        .msg-video-play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255,255,255,0.85);
            pointer-events: none;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* Video upload button */
        .video-upload-btn {
            background: transparent !important;
            border: 1.5px dashed #cbd5e1 !important;
            color: #5b6e8c !important;
            padding: 8px 12px !important;
            border-radius: 40px !important;
            cursor: pointer;
            font-size: 1rem !important;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 40px;
        }

        .video-upload-btn:hover {
            border-color: #8b5cf6 !important;
            color: #8b5cf6 !important;
            background: rgba(139,92,246,0.08) !important;
        }

        /* Video preview overlay */
        .video-preview-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            cursor: pointer;
        }

        .video-preview-overlay video {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            outline: none;
        }

        .video-preview-close {
            position: absolute;
            top: 24px;
            right: 24px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 3001;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .video-preview-close:hover {
            opacity: 1;
        }

        /* Input area */
        .input-group {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(203, 213, 225, 0.5);
        }

        #msgInput {
            flex: 1;
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.85rem;
            background: white;
            outline: none;
        }

        #msgInput:focus {
            border-color: #3b82f6;
        }

        .input-group button {
            background: #3b82f6;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group button:hover {
            background: #2563eb;
        }

        /* Dialog */
        .dialog-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .dialog-box {
            background: rgba(255,255,255,0.96);
            border-radius: 1.5rem;
            padding: 24px 32px;
            width: 340px;
            text-align: center;
        }

        .avatar-circle {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: white;
            margin-bottom: 12px;
        }

        .dialog-box h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .dialog-detail {
            color: #475569;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .dialog-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-reject, .btn-accept {
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-reject {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-accept {
            background: #3b82f6;
            color: white;
        }

        .empty-chat-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
            font-size: 0.8rem;
            gap: 10px;
        }

        /* Responsive */
        @media (max-width: 780px) {
            .chat-sidebar { width: 260px; }
            .msg-bubble { max-width: 95%; }
            #chatBox { width: 98vw; height: 90vh; }
            .chat-header { padding: 8px 16px; }
            .input-group { padding: 8px 12px; gap: 8px; }
            .input-group button { padding: 6px 16px; }
        }
    </style>
</head>
<body>

<div id="loginBox" class="box">
    <div class="login-icon"><i class="fas fa-lock"></i></div>
    <h2>加密聊天</h2>
    <p class="login-subtitle">端到端加密 · 隐密对话</p>
    <input id="username" placeholder="输入用户名" autocomplete="off">
    <button onclick="login()"><i class="fas fa-arrow-right-to-bracket"></i> 进入安全聊天</button>
</div>

<div id="chatBox" class="box chat-box" style="display:none;">
    <div class="chat-header">
        <h2><i class="fas fa-message"></i> 端到端加密 · 私人信道</h2>
        <div class="user-info"><i class="fas fa-user-shield"></i> 当前用户：<span id="userName"></span></div>
    </div>

    <div class="chat-body">
        <!-- Sidebar -->
        <div class="chat-sidebar">
            <!-- Search -->
            <div class="search-section">
                <div class="sidebar-label"><i class="fas fa-user-plus"></i> 建立会话</div>
                <div class="search-box">
                    <input id="searchUserInput" placeholder="输入用户名..." autocomplete="off"
                           oninput="clearSearchResult()"
                           onkeydown="if(event.key==='Enter') searchUser()">
                    <button onclick="searchUser()"><i class="fas fa-search"></i></button>
                </div>
                <div id="searchResult" class="search-result"></div>
            </div>

            <!-- Session list -->
            <div class="session-section">
                <div class="session-header">
                    <div class="sidebar-label"><i class="fas fa-comments"></i> 会话列表</div>
                </div>
                <div class="session-list-container">
                    <div id="sessionList" class="session-list"></div>
                </div>
            </div>

            <!-- Encryption strategy (disabled)
            <div class="algo-section">
                <div class="sidebar-label"><i class="fas fa-shield-haltered"></i> 加密策略</div>
                <div class="algo-row">
                    <label>
                        加密模式
                        <select id="encAlgoSelect" onchange="onEncAlgoChange()">
                            <option value="CBC">AES-128-CBC</option>
                            <option value="GCM">AES-128-GCM</option>
                        </select>
                    </label>
                    <label>
                        哈希摘要
                        <select id="hashAlgoSelect" onchange="onHashAlgoChange()">
                            <option value="MD5">MD5</option>
                            <option value="SHA-1">SHA-1</option>
                        </select>
                    </label>
                    <label class="toggle-label">
                        <span><i class="fas fa-code"></i> 显示密文</span>
                        <input type="checkbox" id="showCiphertextCheckbox" onchange="onToggleCiphertext()">
                    </label>
                </div>
            </div>
            -->
        </div>

        <!-- Chat area -->
        <div class="chat-main">
            <div id="msgArea">
                <div class="empty-chat-hint" id="emptyChatHint" style="display: flex;">
                    <i class="fas fa-lock" style="font-size: 2rem; opacity: 0.5;"></i>
                    <p>✨ 选择会话，开始加密对话 ✨</p>
                </div>
            </div>
            <div class="input-group">
                <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="onImageSelected(event)">
                <input type="file" id="videoInput" accept="video/*" style="display:none;" onchange="onVideoSelected(event)">
                <button class="img-upload-btn" onclick="document.getElementById('imageInput').click()" title="上传图片">
                    <i class="fas fa-image"></i>
                </button>
                <button class="video-upload-btn" onclick="document.getElementById('videoInput').click()" title="上传视频">
                    <i class="fas fa-video"></i>
                </button>
                <textarea id="msgInput" placeholder="输入消息... (建立会话后可发送)" autocomplete="off"
                          onkeydown="handleEnterKey(event)" rows="1"></textarea>
                <button onclick="sendEncryptedMessage()"><i class="fas fa-paper-plane"></i> 发送</button>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>

<script>
    function handleEnterKey(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            sendEncryptedMessage();
        }
    }

    (function() {
        const observer = new MutationObserver(function() {
            const msgArea = document.getElementById('msgArea');
            if(!msgArea) return;
            const children = msgArea.children;
            let hasRealMsg = false;
            for(let i = 0; i < children.length; i++) {
                if(children[i].classList && children[i].classList.contains('msg-bubble')) {
                    hasRealMsg = true;
                    break;
                }
            }
            let hint = document.getElementById('emptyChatHint');
            if(!hint && !hasRealMsg) {
                if(!document.getElementById('emptyChatHint')) {
                    const div = document.createElement('div');
                    div.id = 'emptyChatHint';
                    div.className = 'empty-chat-hint';
                    div.style.display = 'flex';
                    div.innerHTML = '<i class="fas fa-lock" style="font-size: 2rem; opacity: 0.5;"></i><p>✨ 选择会话，开始加密对话 ✨</p>';
                    msgArea.appendChild(div);
                }
            } else if(hint && hasRealMsg) {
                hint.style.display = 'none';
            } else if(hint && !hasRealMsg) {
                hint.style.display = 'flex';
            }
        });

        window.addEventListener('load', () => {
            const msgArea = document.getElementById('msgArea');
            if(msgArea) observer.observe(msgArea, { childList: true, subtree: false });
        });
    })();
</script>
